<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dmem graph</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #0f1115; color: #e6e6e6;
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  #c { display: block; width: 100vw; height: 100vh; cursor: grab; }
  #c.drag { cursor: grabbing; }
  .panel { position: fixed; background: rgba(20,23,30,0.92); border: 1px solid #2a2f3a;
    border-radius: 10px; padding: 10px 12px; backdrop-filter: blur(6px); }
  #top { top: 12px; left: 12px; display: flex; gap: 8px; align-items: center; }
  #top h1 { font-size: 14px; font-weight: 500; margin: 0 8px 0 0; }
  #search { background: #11141a; border: 1px solid #2a2f3a; color: #e6e6e6;
    border-radius: 6px; padding: 5px 8px; width: 220px; outline: none; }
  #stat { color: #8b93a5; }
  #legend { bottom: 12px; left: 12px; max-width: 320px; display: flex; flex-wrap: wrap; gap: 4px 12px; }
  #legend span { display: inline-flex; align-items: center; gap: 5px; color: #b9c0cf; }
  #legend i { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
  #detail { top: 12px; right: 12px; width: 320px; display: none; }
  #detail .k { color: #8b93a5; }
  #detail .t { font-weight: 500; margin: 2px 0 6px; word-break: break-word; }
  #detail .u { color: #6f7789; font-size: 11px; word-break: break-all; }
  #detail ul { margin: 8px 0 0; padding-left: 16px; }
  #detail li { color: #b9c0cf; }
  #hint { bottom: 12px; right: 12px; color: #6f7789; }
  a { color: #7aa2f7; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="top" class="panel">
  <h1>dmem graph</h1>
  <input id="search" placeholder="filter by title...">
  <span id="stat"></span>
</div>
<div id="legend" class="panel"></div>
<div id="detail" class="panel"></div>
<div id="hint" class="panel">scroll to zoom, drag to pan, click a node</div>
<script>
(function () {
  "use strict";
  // --- color by kind: entities in warm tones, memory records in cool tones ---
  var COLORS = {
    org: "#e0823c", engagement: "#d4553e", product: "#caa83a", solution_stack: "#c77dba",
    person: "#d96f9a", framework: "#b98be0", site: "#8fae5d",
    decision: "#378add", resource_summary: "#1d9e75", agent_lesson: "#5dcaa5",
    incident_summary: "#e24b4a", known_failure_mode: "#cf5a4f", remediation_pattern: "#3aa0a0",
    runbook: "#639922", project_convention: "#7f77dd", service_topology: "#4a9fd6",
    persona: "#9a8cf0", protocol: "#7c74cf", reminder: "#caa83a", memory: "#8b93a5"
  };
  function colorOf(k) { return COLORS[k] || "#8b93a5"; }

  var canvas = document.getElementById("c"), ctx = canvas.getContext("2d");
  var W = 0, H = 0, DPR = window.devicePixelRatio || 1;
  function resize() {
    W = canvas.clientWidth; H = canvas.clientHeight;
    canvas.width = W * DPR; canvas.height = H * DPR; ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener("resize", function () { resize(); });

  var nodes = [], edges = [], byId = {}, adj = {};
  var view = { x: 0, y: 0, k: 1 }, alpha = 1, selected = null, filter = "";

  function load() {
    fetch("/graph").then(function (r) { return r.json(); }).then(function (g) {
      if (g.error) { document.getElementById("stat").textContent = "error: " + g.error; }
      build(g.nodes || [], g.edges || []);
    }).catch(function (e) { document.getElementById("stat").textContent = "load failed: " + e; });
  }

  function build(ns, es) {
    byId = {}; adj = {};
    nodes = ns.map(function (n, i) {
      var ang = (i / Math.max(ns.length, 1)) * Math.PI * 2, rad = 60 + Math.random() * 240;
      var node = { id: n.id, label: n.label || n.id, kind: n.kind || "memory",
        x: Math.cos(ang) * rad, y: Math.sin(ang) * rad, vx: 0, vy: 0, deg: 0 };
      byId[n.id] = node; adj[n.id] = []; return node;
    });
    edges = [];
    es.forEach(function (e) {
      var a = byId[e.from], b = byId[e.to];
      if (a && b) { edges.push({ a: a, b: b, rel: e.rel }); a.deg++; b.deg++; adj[a.id].push(b); adj[b.id].push(a); }
    });
    alpha = 1;
    document.getElementById("stat").textContent = nodes.length + " nodes, " + edges.length + " edges";
    legend();
    // center the view roughly
    view = { x: W / 2, y: H / 2, k: nodes.length > 400 ? 0.55 : 0.9 };
  }

  function legend() {
    var seen = {}; nodes.forEach(function (n) { seen[n.kind] = true; });
    var el = document.getElementById("legend"); el.innerHTML = "";
    Object.keys(seen).sort().forEach(function (k) {
      var s = document.createElement("span");
      s.innerHTML = '<i style="background:' + colorOf(k) + '"></i>' + k;
      el.appendChild(s);
    });
  }

  // --- force layout (cooling) ---
  function step() {
    if (alpha < 0.02) return;
    var n = nodes.length, i, j, a, b, dx, dy, d2, d, f;
    // repulsion (capped pairwise; fine for the viewer's record counts)
    for (i = 0; i < n; i++) {
      a = nodes[i];
      for (j = i + 1; j < n; j++) {
        b = nodes[j]; dx = a.x - b.x; dy = a.y - b.y; d2 = dx * dx + dy * dy || 0.01;
        if (d2 > 90000) continue;            // ignore far pairs (soft cutoff)
        f = 900 / d2; a.vx += dx * f; a.vy += dy * f; b.vx -= dx * f; b.vy -= dy * f;
      }
    }
    // springs along edges
    edges.forEach(function (e) {
      dx = e.b.x - e.a.x; dy = e.b.y - e.a.y; d = Math.sqrt(dx * dx + dy * dy) || 0.01;
      f = (d - 70) * 0.02; dx = dx / d * f; dy = dy / d * f;
      e.a.vx += dx; e.a.vy += dy; e.b.vx -= dx; e.b.vy -= dy;
    });
    // gravity to center + integrate
    for (i = 0; i < n; i++) {
      a = nodes[i]; a.vx -= a.x * 0.002; a.vy -= a.y * 0.002;
      a.x += a.vx * alpha; a.y += a.vy * alpha; a.vx *= 0.85; a.vy *= 0.85;
    }
    alpha *= 0.985;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save(); ctx.translate(view.x, view.y); ctx.scale(view.k, view.k);
    var hl = selected ? neighborSet(selected) : null;
    // edges
    ctx.lineWidth = 1 / view.k;
    edges.forEach(function (e) {
      var on = hl && (e.a === selected || e.b === selected);
      ctx.strokeStyle = on ? "rgba(122,162,247,0.8)" : "rgba(120,130,150,0.18)";
      ctx.beginPath(); ctx.moveTo(e.a.x, e.a.y); ctx.lineTo(e.b.x, e.b.y); ctx.stroke();
    });
    // nodes
    nodes.forEach(function (nd) {
      var r = 4 + Math.min(nd.deg, 12) * 0.9;
      var match = filter && nd.label.toLowerCase().indexOf(filter) >= 0;
      var dim = (hl && !hl[nd.id]) || (filter && !match);
      ctx.globalAlpha = dim ? 0.15 : 1;
      ctx.fillStyle = colorOf(nd.kind);
      ctx.beginPath(); ctx.arc(nd.x, nd.y, r, 0, Math.PI * 2); ctx.fill();
      if (nd === selected || match) { ctx.lineWidth = 2 / view.k; ctx.strokeStyle = "#e6e6e6"; ctx.stroke(); }
      // labels: only for hubs / selected / matches / when zoomed in (keeps it readable)
      if (!dim && (nd === selected || match || nd.deg >= 4 || view.k > 1.4)) {
        ctx.globalAlpha = dim ? 0.2 : 0.85; ctx.fillStyle = "#cdd3df";
        ctx.font = (11 / view.k) + "px -apple-system, sans-serif";
        ctx.fillText(trim(nd.label, 28), nd.x + r + 2 / view.k, nd.y + 3 / view.k);
      }
    });
    ctx.globalAlpha = 1; ctx.restore();
  }

  function neighborSet(nd) { var s = {}; s[nd.id] = true; (adj[nd.id] || []).forEach(function (m) { s[m.id] = true; }); return s; }
  function trim(s, n) { return s.length > n ? s.slice(0, n - 1) + "…" : s; }

  function frame() { step(); draw(); requestAnimationFrame(frame); }

  // --- interaction: pan, zoom, click ---
  var dragging = false, moved = false, last = null;
  canvas.addEventListener("mousedown", function (e) { dragging = true; moved = false; last = [e.clientX, e.clientY]; canvas.classList.add("drag"); });
  window.addEventListener("mouseup", function () { dragging = false; canvas.classList.remove("drag"); });
  window.addEventListener("mousemove", function (e) {
    if (!dragging) return; var dx = e.clientX - last[0], dy = e.clientY - last[1];
    if (Math.abs(dx) + Math.abs(dy) > 2) moved = true;
    view.x += dx; view.y += dy; last = [e.clientX, e.clientY];
  });
  canvas.addEventListener("wheel", function (e) {
    e.preventDefault(); var s = e.deltaY < 0 ? 1.1 : 0.9;
    var wx = (e.clientX - view.x) / view.k, wy = (e.clientY - view.y) / view.k;
    view.k = Math.max(0.1, Math.min(6, view.k * s));
    view.x = e.clientX - wx * view.k; view.y = e.clientY - wy * view.k;
  }, { passive: false });
  canvas.addEventListener("click", function (e) {
    if (moved) return;
    var wx = (e.clientX - view.x) / view.k, wy = (e.clientY - view.y) / view.k, hit = null, best = 1e9;
    nodes.forEach(function (nd) { var dx = nd.x - wx, dy = nd.y - wy, d = dx * dx + dy * dy; var r = 4 + Math.min(nd.deg, 12) * 0.9 + 4; if (d < r * r && d < best) { best = d; hit = nd; } });
    selected = hit; detail(hit);
  });

  function detail(nd) {
    var el = document.getElementById("detail");
    if (!nd) { el.style.display = "none"; return; }
    var conns = (adj[nd.id] || []).slice(0, 24).map(function (m) { return "<li>" + esc(trim(m.label, 40)) + " <span class='k'>(" + m.kind + ")</span></li>"; }).join("");
    el.innerHTML = "<div class='k'>" + nd.kind + " &middot; " + (adj[nd.id] || []).length + " links</div>" +
      "<div class='t'>" + esc(nd.label) + "</div><div class='u'>" + esc(nd.id) + "</div>" +
      (conns ? "<ul>" + conns + "</ul>" : "");
    el.style.display = "block";
  }
  function esc(s) { return String(s).replace(/[&<>]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]; }); }

  document.getElementById("search").addEventListener("input", function (e) { filter = e.target.value.trim().toLowerCase(); });

  resize(); load(); requestAnimationFrame(frame);
})();
</script>
</body>
</html>
