name: release

# Build dmem per-OS on a version tag and publish the binaries as a GitHub Release.
# Native deps (zvec C++, onnxruntime) can't be cross-compiled from one host, so each
# target is built on its own runner. zvec v0.5.0 ships prebuilts for every target below.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # full distribution binary: vector store + embeddings + server + wizard + self-update
      - name: Build (dist)
        run: cargo build --release --features dist --target ${{ matrix.target }}

      - name: Stage artifact (binary + native libs)
        shell: bash
        run: |
          set -euo pipefail
          name="dmem-${GITHUB_REF_NAME}-${{ matrix.target }}"
          out="dist/$name"
          mkdir -p "$out"
          bindir="target/${{ matrix.target }}/release"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "$bindir/dmem.exe" "$out/"
          else
            cp "$bindir/dmem" "$out/"
          fi
          # native libs that must ship beside the binary (zvec; onnxruntime if not static)
          for pat in libzvec_c_api.dylib libzvec_c_api.so zvec_c_api.dll \
                     'libonnxruntime*.dylib' 'libonnxruntime*.so*' 'onnxruntime*.dll'; do
            f=$(find "$bindir/build" -name "$pat" 2>/dev/null | head -1 || true)
            [ -n "$f" ] && cp "$f" "$out/" || true
          done
          cp README.md "$out/" 2>/dev/null || true
          cp LICENSE* "$out/" 2>/dev/null || true
          ls -la "$out"

      - name: Archive
        shell: bash
        run: |
          set -euo pipefail
          name="dmem-${GITHUB_REF_NAME}-${{ matrix.target }}"
          # archive the files at the ROOT (no enclosing folder) so `dmem upgrade` (self_update
          # looks for the bin at the archive root) and the README `tar xzf && install dmem`
          # both find dmem directly.
          cd "dist/$name"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "../${name}.zip" ./* >/dev/null
          else
            tar czf "../${name}.tar.gz" *
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dmem-${{ matrix.target }}
          path: dist/*.${{ matrix.archive }}

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          # rc / beta tags publish as a pre-release
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          files: artifacts/*
          generate_release_notes: true
